<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HambuCloud Pro</title>

<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }

.sidebar {
    width:220px;
    background:#222;
    color:white;
    padding:15px;
    display:flex;
    flex-direction:column;
}

.product {
    padding:8px;
    margin:4px 0;
    background:#333;
    cursor:pointer;
}
.product.active { background:#ff5722; }

.main {
    flex:1;
    padding:20px;
    background:#f4f4f9;
    overflow:auto;
}

.row { display:flex; gap:10px; margin-bottom:10px; }
input { flex:1; padding:8px; }

button { padding:8px; border:none; cursor:pointer; }
.btn-add { background:#4CAF50; color:white; }
.btn-del { background:#e53935; color:white; }

h2,h3 { color:#ff5722; }
</style>
</head>

<body>

<div class="sidebar">
    <h2>🍔 Productos</h2>
    <div id="product-list"></div>
    <button class="btn-add" onclick="createProduct()">+ Nuevo</button>
    <button class="btn-del" onclick="deleteProduct()">Eliminar</button>
</div>

<div class="main">
<h2 id="title"></h2>

<h3>Ingredientes</h3>
<div id="ingredients-list"></div>
<button class="btn-add" onclick="addIngredient()">+ Ingrediente</button>

<h3>Packing</h3>
<div id="packing-list"></div>
<button class="btn-add" onclick="addPacking()">+ Packing</button>

<h3>Extras</h3>
<div class="row">
<input type="number" id="delivery-cost" placeholder="Delivery">
<input type="number" id="profit-margin" placeholder="% Ganancia">
</div>

<h3>Resultado</h3>
<p>Total: $<span id="total">0</span></p>
<p>Venta: $<span id="sale">0</span></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCAH5K0AT0807VW4UAhtptSLI0rvxE6N5s",
  authDomain: "hambucloud.firebaseapp.com",
  databaseURL: "https://hambucloud-default-rtdb.firebaseio.com/",
  projectId: "hambucloud"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref("productos");

let products = {};
let currentProduct = null;

// 🔥 ESCUCHAR CAMBIOS EN TIEMPO REAL
ref.on("value", snapshot => {
    if(snapshot.exists()){
        products = snapshot.val();
    } else {
        products = {
            "Hamburguesa Base": {
                ingredients: [],
                packing: [],
                delivery: 0,
                margin: 50
            }
        };
        saveToCloud();
    }

    if(!currentProduct){
        currentProduct = Object.keys(products)[0];
    }

    renderProducts();
    loadProduct();
});

// 🔥 GUARDAR
function saveToCloud(){
    ref.set(products);
}

// 🔥 PRODUCTOS
function createProduct(){
    const name = prompt("Nombre del producto:");
    if(!name || products[name]) return;

    products[name] = { ingredients:[], packing:[], delivery:0, margin:50 };
    currentProduct = name;

    saveToCloud();
}

function deleteProduct(){
    if(!currentProduct) return;
    if(!confirm("¿Eliminar producto?")) return;

    delete products[currentProduct];

    const keys = Object.keys(products);
    currentProduct = keys[0] || null;

    saveToCloud();
}

// 🔥 UI PRODUCTOS
function renderProducts(){
    const list = document.getElementById("product-list");
    list.innerHTML = "";

    Object.keys(products).forEach(name=>{
        const div = document.createElement("div");
        div.className = "product " + (name===currentProduct ? "active":"");
        div.innerText = name;

        div.onclick = ()=>{
            saveCurrent();
            currentProduct = name;
            renderProducts();
            loadProduct();
        };

        list.appendChild(div);
    });
}

// 🔥 INGREDIENTES
function addIngredient(){
    const div = document.createElement("div");
    div.className="row";
    div.innerHTML=`
    <input class="ing-name" placeholder="Nombre">
    <input class="ing-price" type="number" placeholder="$/kg">
    <input class="ing-grams" type="number" placeholder="g">
    <button onclick="this.parentElement.remove()">X</button>`;
    document.getElementById("ingredients-list").appendChild(div);
}

// 🔥 PACKING
function addPacking(){
    const div = document.createElement("div");
    div.className="row";
    div.innerHTML=`
    <input class="pack-name" placeholder="Nombre">
    <input class="pack-cost" type="number" placeholder="$">
    <button onclick="this.parentElement.remove()">X</button>`;
    document.getElementById("packing-list").appendChild(div);
}

// 🔥 GUARDAR ACTUAL
function saveCurrent(){
    if(!currentProduct) return;

    const ingredients=[];
    document.querySelectorAll("#ingredients-list .row").forEach(r=>{
        ingredients.push({
            name:r.querySelector(".ing-name").value,
            price:r.querySelector(".ing-price").value,
            grams:r.querySelector(".ing-grams").value
        });
    });

    const packing=[];
    document.querySelectorAll("#packing-list .row").forEach(r=>{
        packing.push({
            name:r.querySelector(".pack-name").value,
            cost:r.querySelector(".pack-cost").value
        });
    });

    products[currentProduct]={
        ingredients,
        packing,
        delivery:document.getElementById("delivery-cost").value,
        margin:document.getElementById("profit-margin").value
    };

    saveToCloud();
    calculateTotal();
}

// 🔥 CARGAR PRODUCTO
function loadProduct(){
    if(!currentProduct) return;

    const data = products[currentProduct];

    document.getElementById("title").innerText=currentProduct;
    document.getElementById("ingredients-list").innerHTML="";
    document.getElementById("packing-list").innerHTML="";

    data.ingredients.forEach(i=>{
        addIngredient();
        const last=document.querySelector("#ingredients-list .row:last-child");
        last.querySelector(".ing-name").value=i.name;
        last.querySelector(".ing-price").value=i.price;
        last.querySelector(".ing-grams").value=i.grams;
    });

    data.packing.forEach(p=>{
        addPacking();
        const last=document.querySelector("#packing-list .row:last-child");
        last.querySelector(".pack-name").value=p.name;
        last.querySelector(".pack-cost").value=p.cost;
    });

    document.getElementById("delivery-cost").value=data.delivery;
    document.getElementById("profit-margin").value=data.margin;

    calculateTotal();
}

// 🔥 CALCULO
function calculateTotal(){
    let total=0;

    document.querySelectorAll(".ing-price").forEach((p,i)=>{
        const price=parseFloat(p.value)||0;
        const grams=parseFloat(document.querySelectorAll(".ing-grams")[i].value)||0;
        total += (price/1000)*grams;
    });

    document.querySelectorAll(".pack-cost").forEach(p=>{
        total += parseFloat(p.value)||0;
    });

    const delivery=parseFloat(document.getElementById("delivery-cost").value)||0;
    const margin=parseFloat(document.getElementById("profit-margin").value)||0;

    total += delivery;
    const sale = total + total*(margin/100);

    document.getElementById("total").innerText=total.toFixed(2);
    document.getElementById("sale").innerText=sale.toFixed(2);
}
</script>

</body>
</html>
