<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HambuCloud 🍔</title>

<style>
body { font-family: Arial; background:#f4f4f9; padding:20px;}
.container { max-width:700px; margin:auto; background:white; padding:20px; border-radius:10px;}
h1,h2 { text-align:center; color:#ff5722;}
.row { display:flex; gap:10px; margin-bottom:10px;}
input { flex:1; padding:8px;}
button { padding:8px 12px; border:none; background:#ff5722; color:white; cursor:pointer;}
.btn-add{background:#4CAF50;}
.tabs button{margin:3px;}
.active{background:#333;}
</style>
</head>

<body>
<div class="container">
<h1>🍔 HambuCloud</h1>

<h2>Productos</h2>
<div id="tabs" class="tabs"></div>
<button class="btn-add" onclick="createProduct()">+ Nuevo</button>

<h2>Ingredientes</h2>
<div id="ingredients-list"></div>
<button class="btn-add" onclick="addIngredient()">+ Ingrediente</button>

<h2>Packing</h2>
<div id="packing-list"></div>
<button class="btn-add" onclick="addPacking()">+ Packing</button>

<h2>Extras</h2>
<div class="row">
<input type="number" id="delivery-cost" placeholder="Delivery" oninput="calculateTotal()">
<input type="number" id="profit-margin" placeholder="Ganancia %" oninput="calculateTotal()">
</div>

<h2>Resultado</h2>
<p>Total: $<span id="total">0</span></p>
<p>Venta: $<span id="sale">0</span></p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCAH5K0AT0807VW4UAhtptSLI0rvxE6N5s",
  authDomain: "hambucloud.firebaseapp.com",
  projectId: "hambucloud",
  storageBucket: "hambucloud.firebasestorage.app",
  messagingSenderId: "724901872177",
  appId: "1:724901872177:web:0d03a414199ee5966dcb10"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== ESTADO =====
let products = {};
let currentProduct = null;

// ===== FIREBASE SYNC =====
db.collection("productos").doc("data")
.onSnapshot(doc => {
    if(doc.exists){
        products = doc.data();
        if(!currentProduct){
            currentProduct = Object.keys(products)[0];
        }
        renderTabs();
        loadProduct();
    }
});

// ===== GUARDAR EN LA NUBE =====
function saveToCloud(){
    db.collection("productos").doc("data").set(products);
}

// ===== PRODUCTOS =====
function createProduct(){
    const name = prompt("Nombre del producto:");
    if(!name) return;

    products[name] = {
        ingredients: [],
        packing: [],
        delivery: 0,
        margin: 50
    };

    currentProduct = name;
    saveToCloud();
}

function renderTabs(){
    const tabs = document.getElementById("tabs");
    tabs.innerHTML = "";

    Object.keys(products).forEach(name=>{
        const btn = document.createElement("button");
        btn.innerText = name;

        if(name === currentProduct){
            btn.classList.add("active");
        }

        btn.onclick = ()=>{
            saveCurrent();
            currentProduct = name;
            loadProduct();
            renderTabs();
        };

        tabs.appendChild(btn);
    });
}

// ===== UI =====
function addIngredient(){
    const div = document.createElement("div");
    div.className="row";
    div.innerHTML = `
    <input class="ing-name" placeholder="Nombre">
    <input class="ing-price" type="number" placeholder="$/kg" oninput="calculateTotal()">
    <input class="ing-grams" type="number" placeholder="gramos" oninput="calculateTotal()">
    <button onclick="this.parentElement.remove(); calculateTotal()">X</button>
    `;
    document.getElementById("ingredients-list").appendChild(div);
}

function addPacking(){
    const div = document.createElement("div");
    div.className="row";
    div.innerHTML = `
    <input class="pack-name" placeholder="Nombre">
    <input class="pack-cost" type="number" placeholder="$" oninput="calculateTotal()">
    <button onclick="this.parentElement.remove(); calculateTotal()">X</button>
    `;
    document.getElementById("packing-list").appendChild(div);
}

// ===== GUARDAR ACTUAL =====
function saveCurrent(){
    if(!currentProduct) return;

    const ingredients=[];
    document.querySelectorAll("#ingredients-list .row").forEach(r=>{
        ingredients.push({
            name:r.querySelector(".ing-name").value,
            price:r.querySelector(".ing-price").value,
            grams:r.querySelector(".ing-grams").value
        });
    });

    const packing=[];
    document.querySelectorAll("#packing-list .row").forEach(r=>{
        packing.push({
            name:r.querySelector(".pack-name").value,
            cost:r.querySelector(".pack-cost").value
        });
    });

    products[currentProduct]={
        ingredients,
        packing,
        delivery:document.getElementById("delivery-cost").value,
        margin:document.getElementById("profit-margin").value
    };

    saveToCloud();
}

// ===== CARGAR =====
function loadProduct(){
    const data = products[currentProduct];
    if(!data) return;

    document.getElementById("ingredients-list").innerHTML="";
    document.getElementById("packing-list").innerHTML="";

    data.ingredients.forEach(i=>{
        addIngredient();
        const last = document.querySelector("#ingredients-list .row:last-child");
        last.querySelector(".ing-name").value=i.name;
        last.querySelector(".ing-price").value=i.price;
        last.querySelector(".ing-grams").value=i.grams;
    });

    data.packing.forEach(p=>{
        addPacking();
        const last = document.querySelector("#packing-list .row:last-child");
        last.querySelector(".pack-name").value=p.name;
        last.querySelector(".pack-cost").value=p.cost;
    });

    document.getElementById("delivery-cost").value=data.delivery;
    document.getElementById("profit-margin").value=data.margin;

    calculateTotal();
}

// ===== CALCULO =====
function calculateTotal(){
    saveCurrent();

    let totalIng=0;
    document.querySelectorAll(".ing-price").forEach((p,i)=>{
        const price=parseFloat(p.value)||0;
        const grams=parseFloat(document.querySelectorAll(".ing-grams")[i].value)||0;
        totalIng += (price/1000)*grams;
    });

    let totalPack=0;
    document.querySelectorAll(".pack-cost").forEach(p=>{
        totalPack += parseFloat(p.value)||0;
    });

    const delivery=parseFloat(document.getElementById("delivery-cost").value)||0;
    const margin=parseFloat(document.getElementById("profit-margin").value)||0;

    const total = totalIng + totalPack + delivery;
    const sale = total + total*(margin/100);

    document.getElementById("total").innerText=total.toFixed(2);
    document.getElementById("sale").innerText=sale.toFixed(2);
}

// ===== INIT =====
setTimeout(()=>{
    if(Object.keys(products).length===0){
        products["Hamburguesa Base"]={
            ingredients:[],
            packing:[],
            delivery:0,
            margin:50
        };
        currentProduct="Hamburguesa Base";
        saveToCloud();
    }
},1000);

</script>
</body>
</html>
