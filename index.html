<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hambulab Cloud</title>
    
    <!-- SCRIPTS DE FIREBASE CORREGIDOS (Versión 8) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { 
            --primary: #d35400; --secondary: #27ae60; --bg: #f0f2f5; --dark: #2c3e50; 
            --sidebar: #ffffff; --container: #ffffff; --text: #333333; --border: #dddddd;
            --input-bg: #ffffff; --danger: #e74c3c;
        }
        [data-theme="dark"] {
            --bg: #121212; --sidebar: #1e1e1e; --container: #1e1e1e; --text: #e0e0e0;
            --border: #333333; --input-bg: #2d2d2d; --dark: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-switch { cursor: pointer; padding: 5px; border-radius: 5px; border: 1px solid var(--border); background: var(--input-bg); }
        .recipe-list { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .recipe-item { padding: 12px; background: var(--input-bg); border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .recipe-item.active { background: var(--primary); color: white; }
        .btn-new { background: var(--dark); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .container { background: var(--container); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 850px; margin: auto; }
        h2.recipe-title { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: var(--primary); text-align: center; outline: none; }
        .section-box { background: var(--container); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: var(--bg); padding: 10px; font-size: 0.75rem; }
        td { padding: 8px; border-bottom: 1px solid var(--border); }
        input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--input-bg); color: var(--text); box-sizing: border-box; }
        .btn-add { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 6px; width: 100%; margin-top: 10px; cursor: pointer; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .res-box { background: var(--bg); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .res-val { display: block; font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .hidden { display: none; }
        @media (max-width: 768px) { 
            body { flex-direction: column; } 
            .sidebar { width: 100%; height: auto; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); } 
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="font-size: 1.2rem;">Hambulab Cloud</h2>
        <button class="theme-switch" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="recipe-list" id="sidebarList"></div>
    <button class="btn-new" onclick="createNewRecipe()">+ Nueva Receta</button>
</div>

<div class="main-content">
    <div id="noRecipeMessage" style="text-align:center; margin-top:50px; color:#888;">
        <h3>Conectando a la nube...</h3>
    </div>

    <div class="container hidden" id="recipeEditor">
        <h2 class="recipe-title" id="rtitle" contenteditable="true" onblur="saveCurrent()">Nombre</h2>
        
        <div class="section-box">
            <h3>1. Insumos</h3>
            <table>
                <thead><tr><th>Insumo</th><th>g/ml</th><th>$ Kg/L</th><th>Sub</th><th></th></tr></thead>
                <tbody id="ingList"></tbody>
            </table>
            <button class="btn-add" onclick="addRow('ingList')">+ Agregar Insumo</button>
        </div>

        <div class="section-box">
            <h3>2. Packaging</h3>
            <table>
                <thead><tr><th>Elemento</th><th>$ Unitario</th><th></th></tr></thead>
                <tbody id="packList"></tbody>
            </table>
            <button class="btn-add" onclick="addRow('packList')">+ Agregar Empaque</button>
        </div>

        <div class="section-box">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div><label>Envío $:</label><input type="number" id="rdeli" oninput="saveCurrent()"></div>
                <div><label>Ganancia %:</label><input type="number" id="rmargen" oninput="saveCurrent()"></div>
            </div>
        </div>

        <div class="results-grid">
            <div class="res-box"><small>Costo</small><span class="res-val" id="resProd">$0</span></div>
            <div class="res-box"><small>Venta</small><span class="res-val" id="resVenta" style="color:var(--secondary)">$0</span></div>
            <div class="res-box"><small>Ganancia</small><span class="res-val" id="resGana">$0</span></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBoCEVoWzDE_jvvfPQcPm190j8nWdaWmJQ",
      authDomain: "://firebaseapp.com",
      databaseURL: "https://firebaseio.com",
      projectId: "hambulab-cloud",
      storageBucket: "hambulab-cloud.firebasestorage.app",
      messagingSenderId: "6134788683",
      appId: "1:6134788683:web:46c3dc175e7d0ff18553ce"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let recipes = [];
    let currentId = null;

    db.ref('recipes').on('value', (snapshot) => {
        const data = snapshot.val();
        recipes = data ? Object.values(data) : [];
        renderSidebar();
        const msg = document.getElementById('noRecipeMessage');
        if (currentId) {
            const r = recipes.find(rec => rec.id == currentId);
            if (r) updateUI(r);
        } else {
            msg.innerHTML = "<h3>Selecciona o crea una receta</h3>";
        }
    });

    function createNewRecipe() {
        const id = Date.now();
        const newR = { id, title: "Nueva Receta", ing: [], pack: [], deli: 0, margen: 70 };
        db.ref('recipes/' + id).set(newR);
        loadRecipe(id);
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        list.innerHTML = '';
        recipes.forEach(r => {
            const div = document.createElement('div');
            div.className = `recipe-item ${r.id == currentId ? 'active' : ''}`;
            div.innerHTML = `<span onclick="loadRecipe(${r.id})">${r.title}</span>
                             <span style="color:var(--danger); font-weight:bold; cursor:pointer;" onclick="deleteRecipe(${r.id})">✕</span>`;
            list.appendChild(div);
        });
    }

    function loadRecipe(id) {
        currentId = id;
        const r = recipes.find(rec => rec.id == id);
        if (r) {
            document.getElementById('noRecipeMessage').classList.add('hidden');
            document.getElementById('recipeEditor').classList.remove('hidden');
            updateUI(r);
            renderSidebar();
        }
    }

    function addRow(type) {
        if (!currentId) return;
        const r = recipes.find(rec => rec.id == currentId);
        if (type === 'ingList') {
            if (!r.ing) r.ing = [];
            r.ing.push({ n: "", q: 0, p: 0 });
        } else {
            if (!r.pack) r.pack = [];
            r.pack.push({ n: "", p: 0 });
        }
        saveCurrent(r);
    }

    function updateUI(r) {
        document.getElementById('rtitle').innerText = r.title;
        document.getElementById('rdeli').value = r.deli || 0;
        document.getElementById('rmargen').value = r.margen || 0;
        
        const ingBody = document.getElementById('ingList');
        ingBody.innerHTML = '';
        let costIng = 0;
        (r.ing || []).forEach((item, i) => {
            const sub = (item.q * item.p) / 1000;
            costIng += sub;
            ingBody.innerHTML += `<tr>
                <td><input value="${item.n}" onblur="editItem('ing', ${i}, 'n', this.value)"></td>
                <td><input type="number" value="${item.q}" onblur="editItem('ing', ${i}, 'q', this.value)"></td>
                <td><input type="number" value="${item.p}" onblur="editItem('ing', ${i}, 'p', this.value)"></td>
                <td>$${sub.toFixed(2)}</td>
                <td style="color:red; cursor:pointer" onclick="removeItem('ing', ${i})">✕</td>
            </tr>`;
        });

        const packBody = document.getElementById('packList');
        packBody.innerHTML = '';
        let costPack = 0;
        (r.pack || []).forEach((item, i) => {
            costPack += parseFloat(item.p || 0);
            packBody.innerHTML += `<tr>
                <td><input value="${item.n}" onblur="editItem('pack', ${i}, 'n', this.value)"></td>
                <td><input type="number" value="${item.p}" onblur="editItem('pack', ${i}, 'p', this.value)"></td>
                <td style="color:red; cursor:pointer" onclick="removeItem('pack', ${i})">✕</td>
            </tr>`;
        });

        const totalCosto = costIng + costPack + parseFloat(r.deli || 0);
        const precioVenta = totalCosto / (1 - (r.margen / 100));
        
        document.getElementById('resProd').innerText = `$${totalCosto.toFixed(0)}`;
        document.getElementById('resVenta').innerText = `$${precioVenta.toFixed(0)}`;
        document.getElementById('resGana').innerText = `$${(precioVenta - totalCosto).toFixed(0)}`;
    }

    function editItem(type, index, field, value) {
        const r = recipes.find(rec => rec.id == currentId);
        if (field !== 'n') value = parseFloat(value) || 0;
        r[type][index][field] = value;
        saveCurrent(r);
    }

    function removeItem(type, index) {
        const r = recipes.find(rec => rec.id == currentId);
        r[type].splice(index, 1);
        saveCurrent(r);
    }

    function saveCurrent(manualData = null) {
        if (!currentId) return;
        const r = manualData || {
            id: currentId,
            title: document.getElementById('rtitle').innerText,
            deli: parseFloat(document.getElementById('rdeli').value) || 0,
            margen: parseFloat(document.getElementById('rmargen').value) || 0,
            ing: recipes.find(rec => rec.id == currentId).ing || [],
            pack: recipes.find(rec => rec.id == currentId).pack || []
        };
        db.ref('recipes/' + currentId).set(r);
    }

    function deleteRecipe(id) {
        if (confirm('¿Borrar receta?')) {
            db.ref('recipes/' + id).remove();
            if (currentId == id) {
                currentId = null;
                document.getElementById('recipeEditor').classList.add('hidden');
            }
        }
    }

    function toggleTheme() {
        const body = document.documentElement;
        const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', theme);
    }
</script>
</body>
</html>
