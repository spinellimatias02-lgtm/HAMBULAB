        * {

        .summary {

    <script type="module">
        // ==================== CONFIGURACIÓN FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBoCEVoWzDE_jvvfPQcPm190j8nWdaWmJQ",
            authDomain: "hambulab-cloud.firebaseapp.com",
            databaseURL: "https://hambulab-cloud-default-rtdb.firebaseio.com",
            projectId: "hambulab-cloud",
            storageBucket: "hambulab-cloud.firebasestorage.app",
            messagingSenderId: "6134788683",
            appId: "1:6134788683:web:46c3dc175e7d0ff18553ce"
        };

        // Importar Firebase (versión actual estable)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, push } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let recipes = [];
        let currentId = null;

        // ==================== ESCUCHA EN TIEMPO REAL ====================
        const recipesRef = ref(db, 'recipes');
        onValue(recipesRef, (snapshot) => {
            const data = snapshot.val();
            recipes = data ? Object.values(data) : [];
            
            renderSidebar();

            const msg = document.getElementById('noRecipeMessage');
            if (currentId) {
                const currentRecipe = recipes.find(r => r.id === currentId);
                if (currentRecipe) {
                    updateUI(currentRecipe);
                }
            } else {
                msg.innerHTML =  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<h3>👋 ¡Bienvenido a Hambulab Cloud!</h3> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<p style="margin-top:15px;">Selecciona una receta del menú o crea una nueva</p> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;;
            }
        });

        // ==================== FUNCIONES PRINCIPALES ====================
        function createNewRecipe() {
            const id = Date.now().toString();
            const newR = {
                id: id,
                title: "Nueva Receta",
                ing: [],
                pack: [],
                deli: 0,
                margen: 70
            };

            const newRef = ref(db, 'recipes/' + id);
            set(newRef, newR).then(() => {
                loadRecipe(id);
            });
        }

        function renderSidebar() {
            const list = document.getElementById('sidebarList');
            list.innerHTML = '';

            if (recipes.length === 0) {
                list.innerHTML = <div style="padding:20px; text-align:center; color:#888; font-style:italic;">Aún no tienes recetas</div>;
                return;
            }

            recipes.forEach(r => {
                const div = document.createElement('div');
                div.className = recipe-item ${r.id === currentId ? 'active' : ''};
                div.innerHTML =  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span onclick="loadRecipe('$$   {r.id}')">   $${r.title || 'Sin nombre'}</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span onclick="event.stopImmediatePropagation(); deleteRecipe('${r.id}')" style="color:var(--danger); font-weight:bold; cursor:pointer; font-size:1.3rem;">✕</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;;
                list.appendChild(div);
            });
        }

        function loadRecipe(id) {
            currentId = id;
            const r = recipes.find(rec => rec.id === id);
            if (r) {
                document.getElementById('noRecipeMessage').classList.add('hidden');
                document.getElementById('recipeEditor').classList.remove('hidden');
                updateUI(r);
                renderSidebar();
            }
        }

        function updateUI(r) {
            // Título y meta
            document.getElementById('rtitle').textContent = r.title || "Nombre de la receta";
            document.getElementById('rdeli').value = r.deli || 0;
            document.getElementById('rmargen').value = r.margen || 70;

            // Ingredientes
            const ingList = document.getElementById('ingList');
            ingList.innerHTML = '';
            if (r.ing && r.ing.length > 0) {
                r.ing.forEach((item, i) => {
                    ingList.appendChild(createItemRow('ing', item, i));
                });
            } else {
                ingList.innerHTML = <p style="padding:20px; color:#888; text-align:center;">Aún no hay ingredientes</p>;
            }

            // Empaques
            const packList = document.getElementById('packList');
            packList.innerHTML = '';
            if (r.pack && r.pack.length > 0) {
                r.pack.forEach((item, i) => {
                    packList.appendChild(createItemRow('pack', item, i));
                });
            } else {
                packList.innerHTML = <p style="padding:20px; color:#888; text-align:center;">Aún no hay empaques</p>;
            }

            // Resumen simple
            calculateSummary(r);
        }

        function createItemRow(type, item, index) {
            const row = document.createElement('div');
            row.className = 'item-row';
            const isIng = type === 'ing';

            row.innerHTML =                 <input type="text" class="item-name" value="${item.n || ''}"  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;placeholder="${isIng ? 'Nombre del ingrediente' : 'Nombre del empaque'}"  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;onblur="editItem('${type}', ${index}, 'n', this.value)"> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${isIng ?
                <input type="number" class="item-qty" value="${item.q || 0}"
                       placeholder="Cant." step="0.01"
                       onblur="editItem('${type}', ${index}, 'q', parseFloat(this.value))">
                 : ''} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input type="number" class="item-price" value="${item.p || 0}"  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;placeholder="Precio $" step="0.01"  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;onblur="editItem('${type}', ${index}, 'p', parseFloat(this.value))"> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<button onclick="removeItem('${type}', ${index}); event.stopImmediatePropagation()"  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;style="background:none; border:none; color:var(--danger); font-size:1.6rem; cursor:pointer; padding:0 8px;">×</button> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;;
            return row;
        }

        function editItem(type, idx, field, value) {
            if (!currentId) return;
            const r = recipes.find(rec => rec.id === currentId);
            if (!r) return;

            const list = type === 'ing' ? r.ing : r.pack;
            if (!list || !list[idx]) return;

            if (field === 'n') list[idx].n = value.trim();
            else if (field === 'q' || field === 'p') list[idx][field] = isNaN(value) ? 0 : value;

            saveCurrent();
            updateUI(r); // feedback inmediato
        }

        function removeItem(type, idx) {
            if (!currentId) return;
            if (!confirm('¿Eliminar este elemento?')) return;

            const r = recipes.find(rec => rec.id === currentId);
            if (!r) return;

            const list = type === 'ing' ? r.ing : r.pack;
            if (!list) return;

            list.splice(idx, 1);
            saveCurrent();
            updateUI(r);
        }

        function addRow(type) {
            if (!currentId) return;
            const r = recipes.find(rec => rec.id === currentId);
            if (!r) return;

            if (type === 'ing') {
                if (!r.ing) r.ing = [];
                r.ing.push({ n: "", q: 0, p: 0 });
            } else if (type === 'pack') {
                if (!r.pack) r.pack = [];
                r.pack.push({ n: "", p: 0 });
            }

            updateUI(r);
            saveCurrent();
        }

        function saveCurrent() {
            if (!currentId) return;

            const r = recipes.find(rec => rec.id === currentId);
            if (!r) return;

            const updated = {
                id: currentId,
                title: document.getElementById('rtitle').textContent.trim() || "Sin nombre",
                deli: parseFloat(document.getElementById('rdeli').value) || 0,
                margen: parseFloat(document.getElementById('rmargen').value) || 70,
                ing: r.ing || [],
                pack: r.pack || []
            };

            set(ref(db, 'recipes/' + currentId), updated);
        }

        function deleteRecipe(id) {
            if (!confirm('¿Estás seguro de borrar esta receta?')) return;
            
            remove(ref(db, 'recipes/' + id));
            
            if (currentId === id) {
                currentId = null;
                document.getElementById('recipeEditor').classList.add('hidden');
                document.getElementById('noRecipeMessage').classList.remove('hidden');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        }

        function calculateSummary(r) {
            const ingCost = (r.ing || []).reduce((acc, i) => acc + (i.q || 0) * (i.p || 0), 0);
            const packCost = (r.pack || []).reduce((acc, p) => acc + (p.p || 0), 0);
            const totalCost = ingCost + packCost + (r.deli || 0);
            const margen = r.margen || 70;
            const precioVenta = totalCost / (1 - margen / 100);

            document.getElementById('summary').innerHTML =  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<strong>Resumen de costos:</strong><br> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Ingredientes: <strong>$$    {ingCost.toFixed(2)}</strong> •                  Empaques: <strong>    $${packCost.toFixed(2)}</strong> •  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Delivery: <strong>$$    {r.deli.toFixed(2)}</strong><br>                 <span style="font-size:1.4rem; color:var(--primary);">Costo total: <strong>    $${totalCost.toFixed(2)}</strong></span><br> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Precio de venta sugerido (<strong>${margen}% margen</strong>): <strong>$${precioVenta.toFixed(2)}</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;;
        }

        // ==================== EXPONER FUNCION
