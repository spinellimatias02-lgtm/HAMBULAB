<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hambulab Cloud • Firebase</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #d35400;
            --secondary: #27ae60;
            --bg: #f0f2f5;
            --dark: #2c3e50;
            --sidebar: #ffffff;
            --container: #ffffff;
            --text: #333333;
            --border: #dddddd;
            --input-bg: #ffffff;
            --danger: #e74c3c;
        }
       
        [data-theme="dark"] {
            --bg: #121212;
            --sidebar: #1e1e1e;
            --container: #1e1e1e;
            --text: #e0e0e0;
            --border: #333333;
            --input-bg: #2d2d2d;
            --dark: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.12);
            z-index: 10;
        }
        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 {
            font-size: 1.65rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .theme-switch {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.3s;
        }
        .theme-switch:hover { background: rgba(211, 84, 0, 0.15); }

        .recipe-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .recipe-item {
            padding: 16px 18px;
            margin-bottom: 8px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .recipe-item:hover {
            background: rgba(211, 84, 0, 0.12);
            transform: translateY(-1px);
        }
        .recipe-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.3);
        }
        .recipe-item .title { font-weight: 700; font-size: 1.05rem; }
        .recipe-item .info { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
        .recipe-item .total { font-weight: 700; font-size: 1.1rem; }

        .btn-new {
            margin: 16px 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(211, 84, 0, 0.4);
        }
        .btn-new:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(211, 84, 0, 0.5);
        }

        /* Main Content */
        .main-content { flex: 1; padding: 32px; overflow-y: auto; }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--container);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .recipe-title {
            font-size: 2.4rem;
            font-weight: 800;
            border: none;
            background: transparent;
            width: 100%;
            margin-bottom: 20px;
            color: var(--dark);
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }
        .recipe-title:focus { outline: none; border-bottom-color: var(--primary); }

        .meta {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .meta div { flex: 1; min-width: 220px; }
        .meta-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .meta input {
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
        }
        .meta input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(211, 84, 0, 0.15);
        }

        .item-list { margin-bottom: 20px; }
        .item-row {
            display: grid;
            grid-template-columns: 3fr 1fr 1.3fr 1.2fr 60px;
            gap: 14px;
            align-items: center;
            background: var(--input-bg);
            padding: 14px 18px;
            border-radius: 16px;
            border: 2px solid var(--border);
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .item-row:hover { border-color: var(--primary); }
        .item-row input {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
            font-size: 1.05rem;
        }
        .item-row input:focus { border-color: var(--primary); }
        .subtotal {
            text-align: right;
            font-weight: 700;
            font-size: 1.35rem;
            color: var(--primary);
            min-width: 110px;
        }
        .btn-delete {
            color: var(--danger);
            background: none;
            border: none;
            font-size: 1.8rem;
            line-height: 1;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-delete:hover { transform: scale(1.3) rotate(90deg); }

        .btn-add {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.35);
            transition: all 0.3s ease;
        }
        .btn-add:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 22px rgba(39, 174, 96, 0.5);
        }

        .summary-card {
            background: var(--container);
            border-radius: 20px;
            padding: 28px 32px;
            border: 2px solid var(--border);
            margin-top: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
        }
        .summary-card h3 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px dashed var(--border);
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-label { font-size: 1.15rem; font-weight: 500; }
        .summary-value { font-size: 2.2rem; font-weight: 800; }
        .revenue-input {
            font-size: 2.2rem;
            font-weight: 800;
            width: 180px;
            text-align: right;
            background: transparent;
            border: none;
            border-bottom: 3px solid var(--primary);
            outline: none;
        }

        .hidden { display: none; }
        .no-recipe {
            text-align: center;
            padding: 80px 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Hambulab</h2>
            <button class="theme-switch" onclick="toggleTheme()">🌓</button>
        </div>
        
        <div class="recipe-list" id="recipeList"></div>
        
        <button class="btn-new" onclick="createNewAccount()">
            <span>+</span> NUEVA CUENTA
        </button>
    </aside>

    <main class="main-content">
        <div id="noRecipeMessage" class="no-recipe">
            <div style="font-size: 4rem; margin-bottom: 20px;">📋</div>
            <h2 style="font-size: 1.8rem; margin-bottom: 12px;">¡Bienvenido a Hambulab Cloud!</h2>
            <p style="max-width: 420px; margin: 0 auto 30px; line-height: 1.5;">
                Selecciona una cuenta existente o crea una nueva para registrar insumos, calcular costos y ver tus ganancias.
            </p>
            <button onclick="createNewAccount()" class="btn-add" style="font-size: 1.2rem; padding: 18px 36px;">
                + Crear primera cuenta
            </button>
        </div>

        <div id="editorContainer" class="container hidden">
            <input type="text" class="recipe-title" id="accTitle" placeholder="Nombre de la cuenta (ej: Día 20 Abr 2026)">

            <div class="meta">
                <div>
                    <label class="meta-label">Fecha</label>
                    <input type="date" id="accDate">
                </div>
                <div>
                    <label class="meta-label">Responsable</label>
                    <input type="text" id="accUser" placeholder="Tu nombre">
                </div>
            </div>

            <h3 style="margin-bottom: 16px; font-size: 1.5rem; display: flex; align-items: center; gap: 10px;">
                📦 Insumos / Gastos
            </h3>

            <div id="itemList" class="item-list"></div>

            <button class="btn-add" onclick="addItemRow()">
                <span style="font-size: 1.5rem;">+</span> AÑADIR INSUMO / GASTO
            </button>

            <div class="summary-card">
                <h3>📊 Resumen Financiero</h3>
                
                <div class="summary-row">
                    <span class="summary-label">Total Gastos</span>
                    <span id="totalCost" class="summary-value" style="color: #e74c3c;">$ 0.00</span>
                </div>

                <div class="summary-row">
                    <span class="summary-label">Ingresos Totales</span>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 2rem; color: var(--primary);">$</span>
                        <input type="number" id="revenue" class="revenue-input" value="0" step="0.01" min="0">
                    </div>
                </div>

                <div class="summary-row">
                    <span class="summary-label">Ganancia Neta</span>
                    <span id="profit" class="summary-value" style="color: #27ae60;">$ 0.00</span>
                </div>

                <div class="summary-row" style="border-bottom: none;">
                    <span class="summary-label">Margen de Ganancia</span>
                    <span id="margin" class="summary-value" style="color: #27ae60;">0%</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ==================== TU CONFIGURACIÓN DE FIREBASE (YA INTEGRADA) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBoCEVoWzDE_jvvfPQcPm190j8nWdaWmJQ",
            authDomain: "hambulab-cloud.firebaseapp.com",
            databaseURL: "https://hambulab-cloud-default-rtdb.firebaseio.com",
            projectId: "hambulab-cloud",
            storageBucket: "hambulab-cloud.firebasestorage.app",
            messagingSenderId: "6134788683",
            appId: "1:6134788683:web:46c3dc175e7d0ff18553ce"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==================== VARIABLES GLOBALES ====================
        let accounts = [];
        let currentAccount = null;
        let debounceTimer = null;
        const userId = "mi-local";   // ← Cambia esto por algo único tuyo (ej: "hamburgueseria-central")

        // ==================== FUNCIONES CON FIREBASE ====================
        async function loadAccountsFromFirebase() {
            try {
                const snapshot = await db.collection(`users/${userId}/accounts`).orderBy("createdAt", "desc").get();
                accounts = [];
                snapshot.forEach(doc => {
                    accounts.push({ id: doc.id, ...doc.data() });
                });
                renderSidebar();
            } catch (error) {
                console.error("Error cargando cuentas:", error);
            }
        }

        async function saveAccountToFirebase(account) {
            try {
                const accountRef = db.collection(`users/${userId}/accounts`).doc(account.id);
                await accountRef.set({
                    ...account,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (error) {
                console.error("Error guardando en Firebase:", error);
            }
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? null : 'dark');
            localStorage.setItem('theme', current === 'dark' ? 'light' : 'dark');
        }

        function renderSidebar() {
            const list = document.getElementById('recipeList');
            list.innerHTML = '';

            if (accounts.length === 0) {
                const empty = document.createElement('div');
                empty.style.padding = '40px 20px';
                empty.style.textAlign = 'center';
                empty.style.color = '#888';
                empty.innerHTML = `<p>Aún no tienes cuentas.<br>¡Crea la primera!</p>`;
                list.appendChild(empty);
                return;
            }

            accounts.forEach(acc => {
                const totalCost = acc.items ? acc.items.reduce((sum, item) => {
                    return sum + ((parseFloat(item.qty) || 0) * (parseFloat(item.price) || 0));
                }, 0) : 0;

                const itemEl = document.createElement('div');
                itemEl.className = `recipe-item ${currentAccount && currentAccount.id === acc.id ? 'active' : ''}`;
                itemEl.innerHTML = `
                    <div>
                        <div class="title">${acc.title}</div>
                        <div class="info">${acc.date || ''} • ${acc.user || 'Sin responsable'}</div>
                    </div>
                    <div class="total">$${totalCost.toFixed(2)}</div>
                `;
                itemEl.addEventListener('click', () => {
                    currentAccount = acc;
                    loadAccountIntoEditor();
                    renderSidebar();
                });
                list.appendChild(itemEl);
            });
        }

        function calculateTotals() {
            if (!currentAccount) return;
            let totalCost = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
                const price = parseFloat(row.querySelector('.price-input').value) || 0;
                totalCost += qty * price;
                row.querySelector('.subtotal').textContent = `$${(qty * price).toFixed(2)}`;
            });

            document.getElementById('totalCost').textContent = `$${totalCost.toFixed(2)}`;

            const revenue = parseFloat(document.getElementById('revenue').value) || 0;
            const profit = revenue - totalCost;
            const profitEl = document.getElementById('profit');
            profitEl.textContent = `$${profit.toFixed(2)}`;
            profitEl.style.color = profit >= 0 ? '#27ae60' : '#e74c3c';

            const margin = revenue > 0 ? Math.round((profit / revenue) * 100) : 0;
            const marginEl = document.getElementById('margin');
            marginEl.textContent = `${margin}%`;
            marginEl.style.color = margin >= 30 ? '#27ae60' : (margin >= 10 ? '#f39c12' : '#e74c3c');
        }

        async function updateAndSave() {
            if (!currentAccount) return;

            currentAccount.title = document.getElementById('accTitle').value.trim() || 'Cuenta sin nombre';
            currentAccount.date = document.getElementById('accDate').value;
            currentAccount.user = document.getElementById('accUser').value.trim();
            currentAccount.revenue = parseFloat(document.getElementById('revenue').value) || 0;

            currentAccount.items = [];
            document.querySelectorAll('.item-row').forEach(row => {
                const name = row.querySelector('.name-input').value.trim();
                const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
                const price = parseFloat(row.querySelector('.price-input').value) || 0;
                if (name || qty > 0 || price > 0) {
                    currentAccount.items.push({ name, qty, price });
                }
            });

            await saveAccountToFirebase(currentAccount);
            calculateTotals();
            renderSidebar();
        }

        function addItemRow(prefill = null) {
            const container = document.getElementById('itemList');
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <input type="text" class="name-input" placeholder="Nombre del insumo / gasto" value="${prefill ? prefill.name : ''}">
                <input type="number" class="qty-input" placeholder="Cant." min="0" step="0.01" value="${prefill ? prefill.qty : ''}">
                <input type="number" class="price-input" placeholder="Precio unit." min="0" step="0.01" value="${prefill ? prefill.price : ''}">
                <span class="subtotal">$ 0.00</span>
                <button class="btn-delete" onclick="this.closest('.item-row').remove(); updateAndSave();">✕</button>
            `;
            container.appendChild(row);

            const inputs = row.querySelectorAll('input');
            inputs.forEach(input => input.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(updateAndSave, 400);
            }));

            calculateTotals();
        }

        function loadAccountIntoEditor() {
            document.getElementById('noRecipeMessage').classList.add('hidden');
            document.getElementById('editorContainer').classList.remove('hidden');

            document.getElementById('accTitle').value = currentAccount.title || '';
            document.getElementById('accDate').value = currentAccount.date || new Date().toISOString().split('T')[0];
            document.getElementById('accUser').value = currentAccount.user || '';
            document.getElementById('revenue').value = currentAccount.revenue || 0;

            const itemList = document.getElementById('itemList');
            itemList.innerHTML = '';

            if (currentAccount.items && currentAccount.items.length > 0) {
                currentAccount.items.forEach(item => addItemRow(item));
            } else {
                addItemRow();
            }

            calculateTotals();
        }

        async function createNewAccount() {
            const newAccount = {
                id: Date.now().toString(),
                title: `Cuenta ${new Date().toLocaleDateString('es-ES')}`,
                date: new Date().toISOString().split('T')[0],
                user: '',
                items: [],
                revenue: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            accounts.unshift(newAccount);
            currentAccount = newAccount;

            await saveAccountToFirebase(newAccount);
            renderSidebar();
            loadAccountIntoEditor();
        }

        // ==================== INICIALIZACIÓN ====================
        window.onload = async function () {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }

            await loadAccountsFromFirebase();

            const fields = ['accTitle', 'accDate', 'accUser', 'revenue'];
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(updateAndSave, 500);
                });
            });

            console.log('%c✅ Hambulab Cloud conectado a Firebase correctamente!', 'color:#d35400; font-weight:700;');
        };
    </script>
</body>
</html>
