<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hambulab Cloud</title>

    <style>
        /* Tu CSS se mantiene igual (lo omito aquí por brevedad, copia el tuyo completo) */
        :root { 
            --primary: #d35400; --secondary: #27ae60; --bg: #f0f2f5; --dark: #2c3e50; 
            --sidebar: #ffffff; --container: #ffffff; --text: #333333; --border: #dddddd;
            --input-bg: #ffffff; --danger: #e74c3c;
        }
        [data-theme="dark"] {
            --bg: #121212; --sidebar: #1e1e1e; --container: #1e1e1e; --text: #e0e0e0;
            --border: #333333; --input-bg: #2d2d2d; --dark: #ffffff;
        }
        /* ... resto de tu CSS igual ... */
    </style>
</head>
<body>

<div class="sidebar">
    <!-- Tu sidebar igual -->
    <div class="sidebar-header">
        <h2 style="font-size: 1.2rem;">Hambulab Cloud</h2>
        <button class="theme-switch" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="recipe-list" id="sidebarList"></div>
    <button class="btn-new" onclick="createNewRecipe()">+ Nueva Receta</button>
</div>

<div class="main-content">
    <div id="noRecipeMessage" style="text-align:center; margin-top:50px; color:#888;">
        <h3>Conectando a la nube...</h3>
    </div>

    <div class="container hidden" id="recipeEditor">
        <!-- Tu editor igual -->
        <h2 class="recipe-title" id="rtitle" contenteditable="true" onblur="saveCurrent()">Nombre</h2>
        <!-- ... resto del HTML igual ... -->
    </div>
</div>

<!-- === SCRIPTS DE FIREBASE (CORREGIDOS) === -->
<script type="module">
    // Configuración de tu proyecto (la que ya tenías)
    const firebaseConfig = {
      apiKey: "AIzaSyBoCEVoWzDE_jvvfPQcPm190j8nWdaWmJQ",
      authDomain: "hambulab-cloud.firebaseapp.com",
      databaseURL: "https://hambulab-cloud-default-rtdb.firebaseio.com",
      projectId: "hambulab-cloud",
      storageBucket: "hambulab-cloud.firebasestorage.app",
      messagingSenderId: "6134788683",
      appId: "1:6134788683:web:46c3dc175e7d0ff18553ce"
    };

    // Importar Firebase (versión modular actual)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let recipes = [];
    let currentId = null;

    // Escuchar cambios en tiempo real
    const recipesRef = ref(db, 'recipes');
    onValue(recipesRef, (snapshot) => {
        const data = snapshot.val();
        recipes = data ? Object.values(data) : [];
        renderSidebar();
        
        const msg = document.getElementById('noRecipeMessage');
        if (currentId) {
            const r = recipes.find(rec => rec.id == currentId);
            if (r) updateUI(r);
        } else {
            msg.innerHTML = "<h3>Selecciona o crea una receta</h3>";
        }
    });

    function createNewRecipe() {
        const id = Date.now().toString(); // mejor usar string para keys
        const newR = { 
            id, 
            title: "Nueva Receta", 
            ing: [], 
            pack: [], 
            deli: 0, 
            margen: 70 
        };
        
        const newRef = ref(db, 'recipes/' + id);
        set(newRef, newR).then(() => {
            loadRecipe(id);
        });
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        list.innerHTML = '';
        recipes.forEach(r => {
            const div = document.createElement('div');
            div.className = `recipe-item ${r.id == currentId ? 'active' : ''}`;
            div.innerHTML = `<span onclick="loadRecipe('${r.id}')">${r.title}</span>
                             <span style="color:var(--danger); font-weight:bold; cursor:pointer;" onclick="deleteRecipe('${r.id}')">✕</span>`;
            list.appendChild(div);
        });
    }

    function loadRecipe(id) {
        currentId = id;
        const r = recipes.find(rec => rec.id == id);
        if (r) {
            document.getElementById('noRecipeMessage').classList.add('hidden');
            document.getElementById('recipeEditor').classList.remove('hidden');
            updateUI(r);
            renderSidebar();
        }
    }

    // addRow, updateUI, editItem, removeItem, saveCurrent, deleteRecipe, toggleTheme
    // (mantengo tu lógica casi igual, solo ajusto algunas cosas)

    function addRow(type) {
        if (!currentId) return;
        const r = recipes.find(rec => rec.id == currentId);
        if (!r) return;

        if (type === 'ingList') {
            if (!r.ing) r.ing = [];
            r.ing.push({ n: "", q: 0, p: 0 });
        } else {
            if (!r.pack) r.pack = [];
            r.pack.push({ n: "", p: 0 });
        }
        saveCurrent();
    }

    function updateUI(r) {
        // ... tu función updateUI se mantiene casi idéntica ...
        // (copia la que tenías)
        document.getElementById('rtitle').innerText = r.title || "Nombre";
        document.getElementById('rdeli').value = r.deli || 0;
        document.getElementById('rmargen').value = r.margen || 70;
        
        // Resto del código de updateUI igual (ingList y packList)
        // ...
    }

    function saveCurrent() {
        if (!currentId) return;
        
        const r = {
            id: currentId,
            title: document.getElementById('rtitle').innerText.trim() || "Sin nombre",
            deli: parseFloat(document.getElementById('rdeli').value) || 0,
            margen: parseFloat(document.getElementById('rmargen').value) || 70,
            ing: recipes.find(rec => rec.id == currentId)?.ing || [],
            pack: recipes.find(rec => rec.id == currentId)?.pack || []
        };

        set(ref(db, 'recipes/' + currentId), r);
    }

    function deleteRecipe(id) {
        if (confirm('¿Borrar receta?')) {
            remove(ref(db, 'recipes/' + id));
            if (currentId == id) {
                currentId = null;
                document.getElementById('recipeEditor').classList.add('hidden');
                document.getElementById('noRecipeMessage').classList.remove('hidden');
            }
        }
    }

    function toggleTheme() {
        const body = document.documentElement;
        const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', theme);
    }

    // Exportar funciones al window para que onclick las encuentre
    window.createNewRecipe = createNewRecipe;
    window.loadRecipe = loadRecipe;
    window.deleteRecipe = deleteRecipe;
    window.addRow = addRow;
    window.toggleTheme = toggleTheme;
    window.saveCurrent = saveCurrent;
    // Agrega las demás funciones que uses en onclick (editItem, removeItem, etc.)
</script>

<!-- Tus otras funciones (editItem, removeItem, etc.) van aquí o dentro del type="module" con window. -->
<script>
    // Si prefieres, pon aquí las funciones restantes que no necesitan Firebase
    // y exponlas con window.editItem = editItem; etc.
</script>

</body>
</html>
