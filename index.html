<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hambulab Cloud</title>
    <link rel="icon" href="https://flaticon.com" type="image/png">
    
    <!-- Scripts de Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { 
            --primary: #d35400; --secondary: #27ae60; --bg: #f0f2f5; --dark: #2c3e50; 
            --sidebar: #ffffff; --container: #ffffff; --text: #333333; --border: #dddddd;
            --input-bg: #ffffff; --danger: #e74c3c;
        }
        [data-theme="dark"] {
            --bg: #121212; --sidebar: #1e1e1e; --container: #1e1e1e; --text: #e0e0e0;
            --border: #333333; --input-bg: #2d2d2d; --dark: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-switch { cursor: pointer; padding: 5px; border-radius: 5px; border: 1px solid var(--border); background: var(--input-bg); }
        .recipe-list { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .recipe-item { padding: 12px; background: var(--input-bg); border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .recipe-item.active { background: var(--primary); color: white; }
        .btn-new { background: var(--dark); color: var(--sidebar); border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .container { background: var(--container); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 850px; margin: auto; }
        h2.recipe-title { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: var(--primary); text-align: center; outline: none; }
        .section-box { background: var(--container); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: var(--bg); padding: 10px; font-size: 0.75rem; }
        td { padding: 8px; border-bottom: 1px solid var(--border); }
        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--input-bg); color: var(--text); font-size: 16px; }
        .btn-add { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 6px; width: 100%; margin-top: 10px; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .res-box { background: var(--bg); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .res-val { display: block; font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .hidden { display: none; }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>Mis Recetas Cloud</h2>
        <button class="theme-switch" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="recipe-list" id="sidebarList"></div>
    <button class="btn-new" onclick="createNewRecipe()">+ Nueva Receta</button>
</div>

<div class="main-content">
    <div id="noRecipeMessage" style="text-align:center; margin-top:50px; color:#888;">
        <h3>Conectando a la nube...</h3>
    </div>

    <div class="container hidden" id="recipeEditor">
        <h2 class="recipe-title" id="rtitle" contenteditable="true" onblur="saveCurrent()">Nombre</h2>
        <div class="section-box">
            <h3>1. Insumos</h3>
            <table>
                <thead><tr><th>Insumo</th><th>g/ml</th><th>$ Kg/L</th><th>Sub</th><th></th></tr></thead>
                <tbody id="ingList"></tbody>
            </table>
            <button class="btn-add" onclick="addRow('ingList', true)">+ Agregar Insumo</button>
        </div>
        <div class="section-box">
            <h3>2. Packaging</h3>
            <table>
                <thead><tr><th>Elemento</th><th>$ Unitario</th><th></th></tr></thead>
                <tbody id="packList"></tbody>
            </table>
            <button class="btn-add" onclick="addRow('packList', false)">+ Agregar Empaque</button>
        </div>
        <div class="section-box">
            <h3>3. Margen y Delivery</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div><label>Envío $:</label><input type="number" id="rdeli" oninput="saveCurrent()"></div>
                <div><label>Ganancia %:</label><input type="number" id="rmargen" oninput="saveCurrent()"></div>
            </div>
        </div>
        <div class="results-grid">
            <div class="res-box"><small>Costo</small><span class="res-val" id="resProd">$0</span></div>
            <div class="res-box"><small>Venta</small><span class="res-val" id="resVenta" style="color:var(--secondary)">$0</span></div>
            <div class="res-box"><small>Ganancia</small><span class="res-val" id="resGana">$0</span></div>
        </div>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBoCEVoWzDE_jvvfPQcPm190j8nWdaWmJQ",
      authDomain: "hambulab-cloud.firebaseapp.com",
      databaseURL: "https://hambulab-cloud-default-rtdb.firebaseio.com",
      projectId: "hambulab-cloud",
      storageBucket: "hambulab-cloud.firebasestorage.app",
      messagingSenderId: "6134788683",
      appId: "1:6134788683:web:46c3dc175e7d0ff18553ce"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let recipes = [];
    let currentId = null;

    // Escuchar cambios en tiempo real de la nube
    db.ref('recipes').on('value', (snapshot) => {
        const data = snapshot.val();
        recipes = data ? Object.values(data) : [];
        renderSidebar();
        if (currentId) {
            const r = recipes.find(rec => rec.id === currentId);
            if (r) updateUI(r);
        } else {
            document.getElementById('noRecipeMessage').innerHTML = "<h3>Selecciona una receta compartida</h3>";
        }
    });

    function toggleTheme() {
        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('gourmetTheme', newTheme);
    }

    if(localStorage.getItem('gourmetTheme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    function createNewRecipe() {
        const id = Date.now();
        const newR = { id, title: "Nueva Receta", ing: [], pack: [], deli: 0, margen: 70 };
        db.ref('recipes/' + id).set(newR);
        loadRecipe(id);
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        list.innerHTML = '';
        recipes.forEach(r => {
            const div = document.createElement('div');
            div.className = `recipe-item ${r.id === currentId ? 'active' : ''}`;
            div.onclick = () => loadRecipe(r.id);
            div.innerHTML = `<span>${r.title}</span><span style="color:var(--danger)" onclick="deleteRecipe(event, ${r.id})">X</span>`;
            list.appendChild(div);
        });
    }

    function loadRecipe(id) {
        currentId = id;
        const r = recipes.find(rec => rec.id === id);
        document.getElementById('noRecipeMessage').classList.add('hidden');
        document.getElementById('recipeEditor').classList.remove('hidden');
        updateUI(r);
        renderSidebar();
    }

    function updateUI(r) {
        document.getElementById('rtitle').innerText = r.title;
        document.getElementById('rdeli').value = r.deli || 0;
        document.getElementById('rmargen').value = r.margen || 70;
        document.getElementById('ingList').innerHTML = '';
        document.getElementById('packList').innerHTML = '';
        if(r.ing) r.ing.forEach(i => addRow('ingList', true, i));
        if(r.pack) r.pack.forEach(p => addRow('packList', false, p));
        calculate();
    }

    function addRow(listId, isIng, data = {n:'', c:'', p:''}) {
        const tbody = document.getElementById(listId);
        const tr = document.createElement('tr');
        if(isIng) {
            tr.innerHTML = `<td><input type="text" class="n" value="${data.n||''}" onblur="saveCurrent()"></td>
                <td><input type="number" class="c" value="${data.c||''}" oninput="calculate()" onblur="saveCurrent()"></td>
                <td><input type="number" class="p" value="${data.p||''}" oninput="calculate()" onblur="saveCurrent()"></td>
                <td class="sub">$0</td><td><button style="color:red;border:none;background:none;cursor:pointer" onclick="this.closest('tr').remove();saveCurrent()">X</button></td>`;
        } else {
            tr.innerHTML = `<td><input type="text" class="n" value="${data.n||''}" onblur="saveCurrent()"></td>
                <td><input type="number" class="p" value="${data.p||''}" oninput="calculate()" onblur="saveCurrent()"></td>
                <td><button style="color:red;border:none;background:none;cursor:pointer" onclick="this.closest('tr').remove();saveCurrent()">X</button></td>`;
        }
        tbody.appendChild(tr);
        calculate();
    }

    function saveCurrent() {
        if(!currentId) return;
        const r = {
            id: currentId,
            title: document.getElementById('rtitle').innerText,
            deli: parseFloat(document.getElementById('rdeli').value) || 0,
            margen: parseFloat(document.getElementById('rmargen').value) || 0,
            ing: Array.from(document.querySelectorAll('#ingList tr')).map(tr => ({
                n: tr.querySelector('.n').value, c: tr.querySelector('.c').value, p: tr.querySelector('.p').value
            })),
            pack: Array.from(document.querySelectorAll('#packList tr')).map(tr => ({
                n: tr.querySelector('.n').value, p: tr.querySelector('.p').value
            }))
        };
        db.ref('recipes/' + currentId).set(r);
    }

    function calculate() {
        let ti = 0; document.querySelectorAll('#ingList tr').forEach(tr => {
            const c = parseFloat(tr.querySelector('.c').value)||0, p = parseFloat(tr.querySelector('.p').value)||0;
            const s = (c/1000)*p; tr.querySelector('.sub').innerText = `$${s.toFixed(2)}`; ti += s;
        });
        let tp = 0; document.querySelectorAll('#packList tr').forEach(tr => tp += parseFloat(tr.querySelector('.p').value)||0);
        const cost = ti + tp, marg = parseFloat(document.getElementById('rmargen').value)||0;
        const v = cost / ((100-marg)/100 || 1), d = parseFloat(document.getElementById('rdeli').value)||0;
        document.getElementById('resProd').innerText = `$${cost.toFixed(2)}`;
        document.getElementById('resVenta').innerText = `$${(v+d).toFixed(2)}`;
        document.getElementById('resGana').innerText = `$${(v-cost).toFixed(2)}`;
    }

    function deleteRecipe(e, id) {
        e.stopPropagation();
        if(confirm("¿Eliminar de la nube para todos?")) {
            db.ref('recipes/' + id).remove();
            if(currentId === id) {
                currentId = null;
                document.getElementById('recipeEditor').classList.add('hidden');
            }
        }
    }
</script>
</body>
</html>
