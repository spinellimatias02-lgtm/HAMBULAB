<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hambulab Cloud</title>
    <style>
        :root {
            --primary: #d35400;
            --secondary: #27ae60;
            --bg: #f0f2f5;
            --dark: #2c3e50;
            --sidebar: #ffffff;
            --container: #ffffff;
            --text: #333333;
            --border: #dddddd;
            --input-bg: #ffffff;
            --danger: #e74c3c;
        }
        
        [data-theme="dark"] {
            --bg: #121212;
            --sidebar: #1e1e1e;
            --container: #1e1e1e;
            --text: #e0e0e0;
            --border: #333333;
            --input-bg: #2d2d2d;
            --dark: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 3px 0 15px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 { font-size: 1.35rem; color: var(--primary); }

        .theme-switch {
            background: none; border: none; font-size: 1.4rem; cursor: pointer; transition: 0.3s;
        }

        .recipe-list { flex: 1; overflow-y: auto; padding: 12px; }

        .recipe-item {
            padding: 12px; margin-bottom: 6px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .recipe-item:hover { background: rgba(211, 84, 0, 0.1); }
        .recipe-item.active { background: var(--primary); color: white; }

        .btn-new {
            margin: 15px; background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer;
        }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .container {
            max-width: 920px; margin: 0 auto; background: var(--container);
            border-radius: 16px; padding: 35px; border: 1px solid var(--border);
        }

        .recipe-title {
            font-size: 2.2rem; font-weight: 700; border: none; background: transparent;
            width: 100%; margin-bottom: 25px; color: var(--dark); border-bottom: 2px solid transparent;
        }
        .recipe-title:focus { outline: none; border-bottom-color: var(--primary); }

        .meta { display: flex; gap: 20px; margin-bottom: 25px; }
        .meta input { 
            padding: 10px; border-radius: 8px; border: 1px solid var(--border); 
            background: var(--input-bg); color: var(--text);
        }

        .item-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .item-row input { 
            padding: 10px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--input-bg); color: var(--text); flex: 1;
        }

        .btn-add { 
            background: var(--secondary); color: white; border: none; 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; 
        }

        .btn-delete { color: var(--danger); cursor: pointer; background: none; border: none; font-weight: bold; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Hambulab</h2>
            <button class="theme-switch" onclick="toggleTheme()">🌓</button>
        </div>
        <div class="recipe-list" id="recipeList">
            <!-- Las cuentas aparecerán aquí -->
        </div>
        <button class="btn-new" onclick="createNewAccount()">+ Nueva Cuenta</button>
    </aside>

    <main class="main-content">
        <div id="noRecipeMessage">
            <h2>Selecciona o crea una cuenta para empezar</h2>
        </div>

        <div id="editorContainer" class="container hidden">
            <input type="text" class="recipe-title" id="accTitle" placeholder="Nombre de la cuenta...">
            
            <div class="meta">
                <div>
                    <label class="meta-label">Fecha</label>
                    <input type="date" id="accDate">
                </div>
                <div>
                    <label class="meta-label">Responsable</label>
                    <input type="text" id="accUser" placeholder="Nombre">
                </div>
            </div>

            <h3>Insumos / Gastos</h3>
            <div id="itemList" class="item-list">
                <!-- Filas de insumos -->
            </div>
            <button class="btn-add" onclick="addItemRow()">+ Añadir Insumo</button>
        </div>
    </main>

    <script>
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        function createNewAccount() {
            document.getElementById('noRecipeMessage').classList.add('hidden');
            document.getElementById('editorContainer').classList.remove('hidden');
            
            const list = document.getElementById('recipeList');
            const item = document.createElement('div');
            item.className = 'recipe-item active';
            item.innerHTML = `<span>Nueva Cuenta ${list.children.length + 1}</span>`;
            list.appendChild(item);
            
            addItemRow();
        }

        function addItemRow() {
            const container = document.getElementById('itemList');
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <input type="text" placeholder="Insumo">
                <input type="number" placeholder="Cant." style="width: 80px;">
                <input type="number" placeholder="Precio" style="width: 100px;">
                <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(row);
        }
    </script>
</body>
</html>
