<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Costos Hamburguesería</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #ff5722; text-align: center; }
        .section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        input[type="text"], input[type="number"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #ff5722; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #e64a19; }
        .btn-add { background-color: #4CAF50; margin-bottom: 10px;}
        .btn-add:hover { background-color: #45a049; }
        .results { background: #fff3e0; padding: 15px; border-radius: 10px; border: 2px dashed #ff5722; }
        .results p { font-size: 1.1em; margin: 10px 0; }
        .total-price { font-size: 1.5em; font-weight: bold; color: #d84315; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍔 Calculadora de Costos</h1>
    
    <div class="section" id="ingredients-section">
        <h2>Ingredientes (Precio por Kg)</h2>
        <div id="ingredients-list">
            </div>
        <button class="btn-add" onclick="addIngredient()">+ Agregar Ingrediente</button>
    </div>

    <div class="section" id="packing-section">
        <h2>Packing & Extras (Precio por unidad)</h2>
        <div id="packing-list">
            </div>
        <button class="btn-add" onclick="addPacking()">+ Agregar Empaque</button>
    </div>

    <div class="section">
        <h2>Delivery y Ganancia</h2>
        <div class="row">
            <label style="flex:1">Costo de Delivery ($):</label>
            <input type="number" id="delivery-cost" value="0" min="0" oninput="calculateTotal()">
        </div>
        <div class="row">
            <label style="flex:1">Margen de Ganancia (%):</label>
            <input type="number" id="profit-margin" value="50" min="0" oninput="calculateTotal()">
        </div>
    </div>

    <div class="results">
        <h2>Resumen Financiero</h2>
        <p>Costo Total de Ingredientes: $<span id="res-ingredients">0.00</span></p>
        <p>Costo Total de Packing: $<span id="res-packing">0.00</span></p>
        <p>Costo de Delivery: $<span id="res-delivery">0.00</span></p>
        <hr>
        <p style="font-weight: bold;">Costo de Producción Total: $<span id="res-total-cost">0.00</span></p>
        <p class="total-price">Precio Sugerido de Venta: $<span id="res-sale-price">0.00</span></p>
    </div>
</div>

<script>
    function addIngredient() {
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `
            <input type="text" placeholder="Ej: Carne, Queso" class="ing-name">
            <input type="number" placeholder="Precio x Kg ($)" class="ing-price" oninput="calculateTotal()">
            <input type="number" placeholder="Gramos usados" class="ing-grams" oninput="calculateTotal()">
            <button onclick="this.parentElement.remove(); calculateTotal()">X</button>
        `;
        document.getElementById('ingredients-list').appendChild(div);
    }

    function addPacking() {
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `
            <input type="text" placeholder="Ej: Caja, Bolsa" class="pack-name">
            <input type="number" placeholder="Costo ($)" class="pack-cost" oninput="calculateTotal()">
            <button onclick="this.parentElement.remove(); calculateTotal()">X</button>
        `;
        document.getElementById('packing-list').appendChild(div);
    }

    function calculateTotal() {
        // Calcular Ingredientes
        let totalIngredients = 0;
        const prices = document.querySelectorAll('.ing-price');
        const grams = document.querySelectorAll('.ing-grams');
        
        for(let i = 0; i < prices.length; i++) {
            let priceKg = parseFloat(prices[i].value) || 0;
            let gramUsed = parseFloat(grams[i].value) || 0;
            // Regla de 3: (Precio por 1000g) -> costo por los gramos usados
            totalIngredients += (priceKg / 1000) * gramUsed;
        }

        // Calcular Packing
        let totalPacking = 0;
        const packCosts = document.querySelectorAll('.pack-cost');
        packCosts.forEach(input => {
            totalPacking += parseFloat(input.value) || 0;
        });

        // Extras
        let delivery = parseFloat(document.getElementById('delivery-cost').value) || 0;
        let marginPercent = parseFloat(document.getElementById('profit-margin').value) || 0;

        // Totales
        let costTotal = totalIngredients + totalPacking + delivery;
        let finalPrice = costTotal + (costTotal * (marginPercent / 100));

        // Actualizar pantalla
        document.getElementById('res-ingredients').innerText = totalIngredients.toFixed(2);
        document.getElementById('res-packing').innerText = totalPacking.toFixed(2);
        document.getElementById('res-delivery').innerText = delivery.toFixed(2);
        document.getElementById('res-total-cost').innerText = costTotal.toFixed(2);
        document.getElementById('res-sale-price').innerText = finalPrice.toFixed(2);
    }

    // Agregar filas iniciales por defecto
    addIngredient();
    addPacking();
</script>

</body>
</html>
