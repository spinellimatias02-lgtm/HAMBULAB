<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Gourmet Pro</title>

<style>
/* (TODO tu CSS original intacto) */
:root { 
    --primary: #d35400; --secondary: #27ae60; --bg: #f0f2f5; --dark: #2c3e50; 
    --sidebar: #ffffff; --container: #ffffff; --text: #333333; --border: #dddddd;
    --input-bg: #ffffff; --danger: #e74c3c;
}
[data-theme="dark"] {
    --bg: #121212; --sidebar: #1e1e1e; --container: #1e1e1e; --text: #e0e0e0;
    --border: #333333; --input-bg: #2d2d2d; --dark: #ffffff;
}
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text); }
.sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; }
.recipe-item { padding: 10px; margin-bottom: 10px; cursor: pointer; border:1px solid var(--border);}
.recipe-item.active { background: var(--primary); color:#fff; }
.main-content { flex-grow:1; padding:20px; overflow:auto;}
.hidden { display:none; }
</style>
</head>

<body>

<div class="sidebar">
    <h2>Recetas</h2>
    <div id="sidebarList"></div>
    <button onclick="createNewRecipe()">+ Nueva</button>
</div>

<div class="main-content">
    <div id="noRecipeMessage">Selecciona una receta</div>

    <div id="recipeEditor" class="hidden">
        <h2 contenteditable="true" id="rtitle" oninput="saveCurrent()"></h2>

        <h3>Insumos</h3>
        <table><tbody id="ingList"></tbody></table>
        <button onclick="addRow('ingList', true)">+ Insumo</button>

        <h3>Packaging</h3>
        <table><tbody id="packList"></tbody></table>
        <button onclick="addRow('packList', false)">+ Pack</button>

        <br>
        Envío: <input id="rdeli" type="number" oninput="saveCurrent()">
        Margen: <input id="rmargen" type="number" oninput="saveCurrent()">

        <h3 id="resVenta">$0</h3>
    </div>
</div>

<!-- 🔥 FIREBASE MODERNO -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getFirestore, collection, addDoc, getDocs, doc, setDoc, deleteDoc, onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoCEVoWzDE_jvvfPQcPm190j8nWdaWmJQ",
  authDomain: "hambulab-cloud.firebaseapp.com",
  databaseURL: "https://hambulab-cloud-default-rtdb.firebaseio.com",
  projectId: "hambulab-cloud",
  storageBucket: "hambulab-cloud.firebasestorage.app",
  messagingSenderId: "6134788683",
  appId: "1:6134788683:web:46c3dc175e7d0ff18553ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let recipes = [];
let currentId = null;

const colRef = collection(db, "recipes");


// 🔄 TIEMPO REAL
onSnapshot(colRef, (snapshot) => {
    recipes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderSidebar();
});


// 📌 UI
window.createNewRecipe = async function () {
    const docRef = await addDoc(colRef, {
        title: "Nueva Receta",
        ing: [],
        pack: [],
        deli: 0,
        margen: 70
    });
    loadRecipe(docRef.id);
};

function renderSidebar() {
    const list = document.getElementById('sidebarList');
    list.innerHTML = '';

    recipes.forEach(r => {
        const div = document.createElement('div');
        div.className = "recipe-item" + (r.id === currentId ? " active" : "");
        div.innerHTML = `
            ${r.title}
            <button onclick="deleteRecipe(event,'${r.id}')">X</button>
        `;
        div.onclick = () => loadRecipe(r.id);
        list.appendChild(div);
    });
}

window.loadRecipe = function(id) {
    currentId = id;
    const r = recipes.find(x => x.id === id);

    document.getElementById('recipeEditor').classList.remove('hidden');
    document.getElementById('noRecipeMessage').classList.add('hidden');

    document.getElementById('rtitle').innerText = r.title;
    document.getElementById('rdeli').value = r.deli;
    document.getElementById('rmargen').value = r.margen;

    document.getElementById('ingList').innerHTML = '';
    document.getElementById('packList').innerHTML = '';

    r.ing.forEach(i => addRow('ingList', true, i));
    r.pack.forEach(p => addRow('packList', false, p));
};

window.addRow = function(listId, isIng, data = {n:'',c:'',p:''}) {
    const tr = document.createElement('tr');

    if(isIng){
        tr.innerHTML = `
        <td><input class="n" value="${data.n}"></td>
        <td><input class="c" type="number" value="${data.c}"></td>
        <td><input class="p" type="number" value="${data.p}"></td>
        <td><button onclick="this.closest('tr').remove(); saveCurrent()">X</button></td>`;
    } else {
        tr.innerHTML = `
        <td><input class="n" value="${data.n}"></td>
        <td><input class="p" type="number" value="${data.p}"></td>
        <td><button onclick="this.closest('tr').remove(); saveCurrent()">X</button></td>`;
    }

    document.getElementById(listId).appendChild(tr);
};

window.saveCurrent = async function() {
    if(!currentId) return;

    const r = {
        title: document.getElementById('rtitle').innerText,
        deli: parseFloat(document.getElementById('rdeli').value)||0,
        margen: parseFloat(document.getElementById('rmargen').value)||0,
        ing: [],
        pack: []
    };

    document.querySelectorAll('#ingList tr').forEach(tr => {
        r.ing.push({
            n: tr.querySelector('.n').value,
            c: tr.querySelector('.c').value,
            p: tr.querySelector('.p').value
        });
    });

    document.querySelectorAll('#packList tr').forEach(tr => {
        r.pack.push({
            n: tr.querySelector('.n').value,
            p: tr.querySelector('.p').value
        });
    });

    await setDoc(doc(db, "recipes", currentId), r);
};

window.deleteRecipe = async function(e,id){
    e.stopPropagation();
    if(confirm("Eliminar?")){
        await deleteDoc(doc(db,"recipes",id));
    }
};

</script>

</body>
</html>
